<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉬운 글 배움터 - 외부 진단 연동형</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #fdfbf7;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        body { background-color: var(--bg-color); color: #333; }

        /* 상단 IQ 상태 표시바 */
        .iq-status {
            background: #2c3e50; color: white; padding: 10px 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .iq-badge { background: #ffd93d; color: #000; padding: 3px 12px; border-radius: 20px; font-weight: 800; }

        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); }
        .container { max-width: 1100px; margin: -30px auto 60px; padding: 0 20px; }
        
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background: var(--white); padding: 40px; border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center;
            transition: 0.3s; position: relative;
        }
        .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        .lock-icon { font-size: 24px; margin-bottom: 10px; display: block; }

        .main-btn {
            background: var(--primary-color); color: white; border: none;
            padding: 16px 32px; border-radius: 50px; font-weight: 800; cursor: pointer;
            font-size: 18px; margin-top: 20px; text-decoration: none; display: inline-block;
        }

        /* 외부 테스트 팝업 레이어 */
        #externalTestLayer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
        }
        .modal-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 80%; background: white; border-radius: 20px; overflow: hidden;
        }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
        .modal-footer { height: 60px; background: #eee; display: flex; align-items: center; justify-content: center; gap: 20px; }
    </style>
</head>
<body>

<div class="iq-status">
    <span>✨ 쉬운 글 배움터 진단 센터</span>
    <div id="iqInfo">진단 상태: <span class="iq-badge" id="iqValue">미진단</span></div>
</div>

<section class="hero">
    <h1 id="mainTitle">외부 전문 기관과 연동하여 지능을 측정합니다</h1>
    <p id="mainDesc">임의의 문항이 아닌, 검증된 외부 테스트 결과를 바탕으로 서비스를 제공합니다.</p>
    <button onclick="openExternalTest()" class="main-btn" id="triggerBtn">외부 전문 진단 시작하기</button>
</section>

<main class="container">
    <div class="feature-grid">
        <div class="card locked" id="srv-easy">
            <span class="lock-icon">🔒</span>
            <h3>맞춤형 쉬운 글 변환</h3>
            <p>측정된 IQ 수준에 맞춰 문장 구조를 재배치합니다.</p>
        </div>
        <div class="card locked" id="srv-word">
            <span class="lock-icon">🔒</span>
            <h3>인지 능력 기반 단어장</h3>
            <p>사용자의 인지 범위 내 단어들을 추천합니다.</p>
        </div>
    </div>
</main>

<div id="externalTestLayer">
    <div class="modal-content">
        <iframe id="testFrame" src="about:blank"></iframe>
        <div class="modal-footer">
            <p>테스트를 완료하신 후, 결과 화면에 표시된 점수를 아래에 입력해주세요.</p>
            <input type="number" id="scoreInput" placeholder="결과 점수 입력" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
            <button onclick="applyExternalScore()" style="padding: 8px 20px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer;">결과 적용하기</button>
            <button onclick="closeModal()" style="padding: 8px; background: #666; color: white; border: none; border-radius: 5px; cursor: pointer;">닫기</button>
        </div>
    </div>
</div>

<script>
    // 1. 외부 사이트 연동 설정 (공신력 있는 오픈소스 지능 검사 페이지)
    const EXTERNAL_TEST_URL = "https://openpsychometrics.org/tests/FART/"; // 예시: 도형 추론 기반 공인 테스트

    function openExternalTest() {
        document.getElementById('externalTestLayer').style.display = 'block';
        document.getElementById('testFrame').src = EXTERNAL_TEST_URL;
    }

    function closeModal() {
        document.getElementById('externalTestLayer').style.display = 'none';
        document.getElementById('testFrame').src = 'about:blank';
    }

    // 2. 외부 결과를 받아서 서비스 활성화 (임의 문항 배제)
    function applyExternalScore() {
        const score = document.getElementById('scoreInput').value;
        if(!score || score < 1) {
            alert("정확한 테스트 결과를 입력해주세요.");
            return;
        }

        // 입력된 외부 점수를 IQ로 환산 (테스트 종류에 따라 로직 가변적)
        const interpretedIQ = parseInt(score); // 테스트 사이트의 결과값 그대로 수용
        
        localStorage.setItem('external_iq', interpretedIQ);
        updateServiceUI(interpretedIQ);
        closeModal();
    }

    function updateServiceUI(iq) {
        document.getElementById('iqValue').innerText = `IQ ${iq}`;
        document.getElementById('iqValue').style.background = "#2ecc71";
        document.getElementById('iqValue').style.color = "white";

        // 서비스 잠금 해제
        document.querySelectorAll('.card').forEach(c => {
            c.classList.remove('locked');
            const icon = c.querySelector('.lock-icon');
            if(icon) icon.innerText = "✅";
        });

        // 지능 지수에 따른 개인화 문구 (임의 문항 없이 결과값만 활용)
        const title = document.getElementById('mainTitle');
        const desc = document.getElementById('mainDesc');
        const triggerBtn = document.getElementById('triggerBtn');

        triggerBtn.style.display = "none";
        title.innerText = `IQ ${iq} 맞춤형 서비스가 활성화되었습니다.`;
        
        if(iq >= 120) {
            desc.innerText = "상위권 인지 능력에 맞춰 정보의 밀도를 높인 전문 요약 모드를 제공합니다.";
        } else if(iq >= 90) {
            desc.innerText = "표준 인지 수준에 최적화된 명확하고 논리적인 쉬운 글 모드를 제공합니다.";
        } else {
            desc.innerText = "기초 어휘와 시각적 자료가 강조된 직관적인 배움터 모드를 제공합니다.";
        }
    }

    // Vercel 배포 후 재방문 시 데이터 유지
    window.onload = () => {
        const savedIQ = localStorage.getItem('external_iq');
        if(savedIQ) updateServiceUI(parseInt(savedIQ));
    };
</script>

</body>
</html>
