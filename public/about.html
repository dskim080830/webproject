<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 소개 - 쉬운 글 배움터</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #fdfbf7;
            --white: #ffffff;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.8; }

        /* [Header] index.html 스타일 동기화 */
        header {
            background-color: var(--white);
            padding: 0 5%;
            height: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .main-menu { display: flex; list-style: none; gap: 30px; }
        .main-menu li a { text-decoration: none; color: #444; font-size: 18px; font-weight: 700; }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        #guest-menu { display: flex; align-items: center; gap: 10px; }
        #user-menu { display: none; align-items: center; gap: 15px; font-weight: 700; }
        
        .login-btn { cursor: pointer; border: none; background: none; font-size: 17px; font-weight: 700; color: var(--text); padding: 10px 15px; }
        .signup-btn { 
            cursor: pointer; background: var(--primary); color: white; 
            padding: 10px 22px; border-radius: 50px; font-weight: 700; text-decoration: none;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        }

        /* [Modal] 이미지 양식 반영 */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);
            align-items: center; justify-content: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background-color: var(--white); padding: 40px; border-radius: 30px;
            width: 90%; max-width: 500px; position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: #aaa; }
        
        .modal-content h2 { margin-bottom: 30px; color: var(--primary); text-align: left; font-weight: 800; font-size: 28px; }
        .modal-content label { display: block; font-weight: 700; margin-bottom: 8px; margin-top: 15px; font-size: 15px; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; transition: 0.2s;
        }
        .modal-content input:focus { border-color: var(--primary); }

        .modal-btn {
            width: 100%; padding: 18px; margin-top: 30px; background: var(--primary);
            color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: 800; cursor: pointer;
        }
        .auth-sub-btn { 
            width: 100px; border-radius: 15px; border: none; background: #eee; 
            cursor: pointer; font-weight: 700; font-size: 14px; 
        }

        /* 서비스 소개 본문 */
        .container { max-width: 1000px; margin: 60px auto; padding: 0 20px; }
        .intro-card { background: var(--white); padding: 50px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .intro-card h2 { color: var(--primary); font-size: 32px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="./index.html" class="logo">✨ 쉬운 글 배움터</a>
        <ul class="main-menu">
            <li><a href="./about.html">서비스 소개</a></li>
            <li><a href="./text.html">쉬운 글 변환기</a></li>
            <li><a href="./behavior.html">행동 사전</a></li>
            <li><a href="./read.html">글 읽어주기</a></li>
        </ul>
    </div>
    <div class="header-right">
        <div id="guest-menu">
            <button onclick="openModal('loginModal')" class="login-btn">로그인</button>
            <button onclick="openModal('signupModal')" class="signup-btn">회원가입</button>
        </div>
        <div id="user-menu">
            <span id="user-info">사용자님</span>
            <button class="logout-btn" style="background:#eee; padding:8px 15px; border-radius:50px; border:none; cursor:pointer; margin-left:10px;" onclick="handleLogout()">로그아웃</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="intro-card">
        <h2>🤝 서비스 소개</h2>
        <p style="text-align:center; font-size:18px; color:#666; margin-top: 20px;">
            모든 사람이 정보를 평등하게 누릴 수 있도록 돕는 따뜻한 공간입니다.
        </p>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <span class="close-modal" onclick="closeModal('loginModal')">&times;</span>
        <h2 style="text-align: center;">로그인</h2>
        <input type="text" id="loginId" placeholder="아이디">
        <input type="password" id="loginPw" placeholder="비밀번호" style="margin-top:10px;">
        <button class="modal-btn" onclick="handleLogin()">로그인하기</button>
    </div>
</div>

<div id="signupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('signupModal')">&times;</span>
        <h2>회원가입</h2>
        
        <label>성함</label>
        <input type="text" id="regName" placeholder="성함을 입력하세요">

        <label>아이디</label>
        <input type="text" id="regId" placeholder="아이디를 입력하세요">

        <label>비밀번호</label>
        <input type="password" id="regPw" placeholder="8자 이상, 특수문자 필수">

        <label>이메일 인증</label>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="email" id="regEmail" placeholder="example@gmail.com" style="margin:0;">
            <button type="button" class="auth-sub-btn" onclick="sendAuthCode()">코드받기</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="regAuthCode" placeholder="인증번호 6자리" style="margin:0;">
            <button type="button" class="auth-sub-btn" style="background: var(--primary); color: white;" onclick="verifyAuthCode()">확인</button>
        </div>
        <p id="authMessage" style="font-size: 13px; margin-top: 5px; font-weight: bold;"></p>

        <label>휴대폰 번호</label>
        <input type="tel" id="regPhone" placeholder="010-0000-0000">

        <label>생년월일</label>
        <input type="date" id="regBirth">

        <label>학습 단계</label>
        <select id="regLevel">
            <option value="경계선 지능">경계선 지능</option>
            <option value="경도 지적 장애">경도 지적 장애</option>
            <option value="중도 지적 장애">중도 지적 장애</option>
        </select>
        
        <button class="modal-btn" onclick="handleSignup()">가입하기</button>
    </div>
</div>

<script>
    let isEmailVerified = false; // 인증 여부 변수

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 1. 초기 로드 시 인증 확인
    window.onload = async function() {
        try {
            const res = await fetch('/api/check-auth');
            if (res.ok) {
                const data = await res.json();
                document.getElementById('guest-menu').style.display = 'none';
                document.getElementById('user-menu').style.display = 'flex';
                document.getElementById('user-info').innerHTML = `✨ <strong>${data.name}</strong>님`;
            }
        } catch (e) { console.error("인증 확인 안됨"); }
    };

    // 2. 인증번호 발송 (api/send-email.js 호출)
    async function sendAuthCode() {
        const email = document.getElementById('regEmail').value;
        if (!email) { alert("이메일을 입력해주세요."); return; }

        try {
            const res = await fetch('/api/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email || "" })
            });
            if (res.ok) { alert("인증번호가 발송되었습니다."); } 
            else { alert("발송 실패. 메일 주소를 확인하세요."); }
        } catch (e) { alert("서버 연결 실패"); }
    }

    // 3. 인증번호 확인 (api/verify-code.js 가정)
    async function verifyAuthCode() {
        const email = document.getElementById('regEmail').value;
        const code = document.getElementById('regAuthCode').value;
        const msg = document.getElementById('authMessage');

        if (!code) { alert("번호를 입력하세요."); return; }

        try {
            const res = await fetch('/api/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email || "", code: code || "" })
            });
            if (res.ok) {
                alert("인증되었습니다.");
                isEmailVerified = true;
                msg.innerText = "✅ 이메일 인증 완료";
                msg.style.color = "green";
            } else {
                alert("인증번호가 틀립니다.");
                isEmailVerified = false;
                msg.innerText = "❌ 인증 실패";
                msg.style.color = "red";
            }
        } catch (e) { alert("서버 오류"); }
    }

    // 4. 회원가입 실행 (undefined 에러 방지 처리)
    async function handleSignup() {
        if (!isEmailVerified) { alert("이메일 인증을 완료해주세요."); return; }

        const signupData = {
            name: document.getElementById('regName').value || null,
            id: document.getElementById('regId').value || null,
            pw: document.getElementById('regPw').value || null,
            email: document.getElementById('regEmail').value || null,
            phone: document.getElementById('regPhone').value || null,
            birth: document.getElementById('regBirth').value || null,
            level: document.getElementById('regLevel').value || null
        };

        // 빈 파라미터 체크
        if (Object.values(signupData).includes(null)) {
            alert("모든 빈칸을 채워주세요.");
            return;
        }

        const res = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(signupData)
        });

        if (res.ok) {
            alert("가입 성공! 로그인 해주세요.");
            location.reload();
        } else {
            const err = await res.json();
            alert(err.error || "가입 실패");
        }
    }

    async function handleLogin() {
        const id = document.getElementById('loginId').value;
        const pw = document.getElementById('loginPw').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id || "", pw: pw || "" })
        });
        if (res.ok) { location.reload(); } else { alert("로그인 정보 확인 요망"); }
    }

    async function handleLogout() {
        await fetch('/api/logout', { method: 'POST' });
        location.reload();
    }

    window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
</script>
</body>
</html>
