<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 소개 - 쉬운 글 배움터</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        :root { --primary: #4a90e2; --bg: #fdfbf7; --white: #ffffff; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.8; }

        /* 헤더 */
        header {
            background-color: var(--white); padding: 0 5%; height: 90px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .main-menu { display: flex; list-style: none; gap: 30px; }
        .main-menu li a { text-decoration: none; color: #444; font-size: 18px; font-weight: 700; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        
        .login-btn { cursor: pointer; border: none; background: none; font-size: 17px; font-weight: 700; padding: 10px 15px; }
        .signup-btn { 
            cursor: pointer; background: var(--primary); color: white; padding: 10px 22px; 
            border-radius: 50px; font-weight: 700; text-decoration: none;
        }

        /* 모달 */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);
            align-items: center; justify-content: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background-color: var(--white); padding: 40px; border-radius: 30px;
            width: 90%; max-width: 500px; position: relative; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: #aaa; }
        
        .modal-content h2 { margin-bottom: 25px; color: var(--primary); font-weight: 800; }
        .modal-content label { display: block; font-weight: 700; margin-top: 15px; margin-bottom: 5px; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none;
        }
        .modal-btn {
            width: 100%; padding: 18px; margin-top: 25px; background: var(--primary);
            color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: 800; cursor: pointer;
        }
        .auth-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .small-btn { width: 100px; border-radius: 15px; border: none; background: #eee; font-weight: 700; cursor: pointer; }

        .container { max-width: 1000px; margin: 60px auto; padding: 50px; background: white; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="./index.html" class="logo">✨ 쉬운 글 배움터</a>
        <ul class="main-menu">
            <li><a href="./about.html">서비스 소개</a></li>
            <li><a href="./text.html">쉬운 글 변환기</a></li>
            <li><a href="./behavior.html">행동 사전</a></li>
            <li><a href="./read.html">글 읽어주기</a></li>
        </ul>
    </div>
    <div class="header-right">
        <div id="guest-menu">
            <button onclick="openModal('loginModal')" class="login-btn">로그인</button>
            <button onclick="openModal('signupModal')" class="signup-btn">회원가입</button>
        </div>
        <div id="user-menu" style="display:none;">
            <span id="user-info"></span>
            <button onclick="handleLogout()" style="margin-left:10px; cursor:pointer;">로그아웃</button>
        </div>
    </div>
</header>

<div class="container">
    <h2>🤝 서비스 소개</h2>
    <p style="margin-top:20px;">쉬운 글 배움터는 모든 이의 정보 접근성을 위해 존재합니다.</p>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <span class="close-modal" onclick="closeModal('loginModal')">&times;</span>
        <h2 style="text-align: center;">로그인</h2>
        <input type="text" id="loginId" placeholder="아이디">
        <input type="password" id="loginPw" placeholder="비밀번호" style="margin-top:10px;">
        <button class="modal-btn" onclick="handleLogin()">로그인하기</button>
    </div>
</div>

<div id="signupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('signupModal')">&times;</span>
        <h2>회원가입</h2>
        
        <label>성함</label>
        <input type="text" id="regName" placeholder="성함을 입력하세요">

        <label>아이디</label>
        <input type="text" id="regId" placeholder="아이디를 입력하세요">

        <label>비밀번호</label>
        <input type="password" id="regPw" placeholder="8자 이상, 특수문자 필수">

        <label>이메일 인증</label>
        <div class="auth-row">
            <input type="email" id="regEmail" placeholder="example@gmail.com">
            <button type="button" class="small-btn" onclick="sendAuthCode()">코드받기</button>
        </div>
        <div class="auth-row">
            <input type="text" id="regAuthCode" placeholder="인증번호 6자리">
            <button type="button" class="small-btn" style="background: var(--primary); color: white;" onclick="verifyAuthCode()">확인</button>
        </div>
        <p id="authMessage" style="font-size:13px; font-weight:bold;"></p>

        <label>휴대폰 번호</label>
        <input type="tel" id="regPhone" placeholder="010-0000-0000">

        <label>생년월일</label>
        <input type="date" id="regBirth">

        <label>학습 단계</label>
        <select id="regLevel">
            <option value="경계선 지능">경계선 지능</option>
            <option value="경도 지적 장애">경도 지적 장애</option>
            <option value="중도 지적 장애">중도 지적 장애</option>
        </select>
        
        <button class="modal-btn" onclick="handleSignup()">가입하기</button>
    </div>
</div>

<script>
    let isEmailVerified = false;

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 1. 인증번호 발송 (파일명 일치 확인: api/send-email.js)
    async function sendAuthCode() {
        const email = document.getElementById('regEmail').value;
        if (!email) return alert("이메일을 입력해주세요.");

        const res = await fetch('/api/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        if (res.ok) alert("인증번호가 발송되었습니다.");
        else alert("발송 실패");
    }

    // 2. 인증번호 확인 (가장 중요한 부분)
    async function verifyAuthCode() {
        const email = document.getElementById('regEmail').value;
        const code = document.getElementById('regAuthCode').value;
        const msg = document.getElementById('authMessage');

        if (!code) return alert("번호를 입력해주세요.");

        const res = await fetch('/api/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                email: email, 
                code: String(code).trim() // 문자열로 변환 및 공백 제거
            })
        });

        if (res.ok) {
            alert("인증 성공!");
            isEmailVerified = true;
            msg.innerText = "✅ 인증 완료";
            msg.style.color = "green";
        } else {
            alert("인증번호가 일치하지 않습니다.");
            isEmailVerified = false;
            msg.innerText = "❌ 인증 실패";
            msg.style.color = "red";
        }
    }

    // 3. 회원가입
    async function handleSignup() {
        if (!isEmailVerified) return alert("이메일 인증을 먼저 완료해주세요.");

        const signupData = {
            name: document.getElementById('regName').value,
            id: document.getElementById('regId').value,
            pw: document.getElementById('regPw').value,
            email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhone').value,
            birth: document.getElementById('regBirth').value,
            level: document.getElementById('regLevel').value
        };

        const res = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(signupData)
        });

        if (res.ok) {
            alert("가입 성공!");
            location.reload();
        } else {
            const err = await res.json();
            alert(err.error || "가입 실패");
        }
    }

    // 로그인/로그아웃/상태확인 (기존과 동일)
    window.onload = async () => {
        const res = await fetch('/api/check-auth');
        if (res.ok) {
            const data = await res.json();
            document.getElementById('guest-menu').style.display = 'none';
            document.getElementById('user-menu').style.display = 'flex';
            document.getElementById('user-info').innerText = `✨ ${data.name}님`;
        }
    };

    async function handleLogin() {
        const id = document.getElementById('loginId').value;
        const pw = document.getElementById('loginPw').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, pw })
        });
        if (res.ok) location.reload();
        else alert("로그인 실패");
    }

    async function handleLogout() {
        await fetch('/api/logout', { method: 'POST' });
        location.reload();
    }

    window.onclick = (e) => { if (e.target.className === 'modal') e.target.style.display = 'none'; };
</script>
</body>
</html>
