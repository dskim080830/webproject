<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>행동 사전</title>

    <style>
      :root {
        --primary-color: #4a90e2;
        --secondary-color: #ffd93d;
        --accent-color: #ff8a5c;
        --bg-color: #fdfbf7;
        --text-color: #333333;
        --white: #ffffff;
        --error-color: #e74c3c;
        --success-color: #2ecc71;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Nanum Gothic", sans-serif;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.8;
        word-break: keep-all;
      }

      header {
        background-color: var(--white);
        padding: 0 5%;
        height: 90px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 40px;
      }
      .logo {
        font-size: 28px;
        font-weight: 800;
        color: var(--primary-color);
        text-decoration: none;
        white-space: nowrap;
      }
      .main-menu {
        display: flex;
        list-style: none;
        gap: 30px;
      }
      .main-menu li a {
        text-decoration: none;
        color: #444;
        font-size: 18px;
        font-weight: 700;
        transition: color 0.2s;
      }
      .main-menu li a:hover {
        color: var(--primary-color);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      #guest-menu {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #user-menu {
        display: none;
        align-items: center;
        gap: 15px;
        font-weight: 700;
      }

      .login-btn,
      .signup-btn,
      .logout-btn {
        cursor: pointer;
        text-decoration: none;
        font-weight: 700;
        border: none;
        font-size: 16px;
      }
      .login-btn {
        background: none;
        color: var(--text-color);
        padding: 10px 15px;
      }
      .signup-btn {
        background-color: var(--primary-color);
        color: white;
        padding: 10px 22px;
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        transition: all 0.2s;
      }
      .logout-btn {
        background-color: #eee;
        color: #666;
        padding: 8px 15px;
        border-radius: 50px;
        font-size: 14px;
      }

      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 80px);
      }

      .card {
        width: 100%;
        max-width: 800px;
        height: 700px;
        background: var(--white);
        border-radius: 30px;
        padding: 30px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .quiz-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-bottom: 120px;
      }

      #question {
        font-size: 22px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 25px;
      }

      #options {
        flex-grow: 1;
        overflow-y: auto;
        max-height: 300px;
      }

      .result-area {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        text-align: center;
      }

      #result {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 15px;
      }

      h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 20px;
      }

      .option-btn {
        width: 100%;
        padding: 20px;
        margin: 10px 0;
        font-size: 20px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        background: #f0f7ff;
        transition: 0.2s;
      }

      .option-btn:hover {
        background: #dbe9ff;
      }

      .correct {
        background: var(--success-color) !important;
        color: white;
      }
      .wrong {
        background: var(--error-color) !important;
        color: white;
      }

      .next-btn-bottom {
        width: 100%;
        padding: 10px;
        font-size: 20px;
        font-weight: 800;
        border: none;
        border-radius: 20px;
        background: var(--primary-color);
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      #loading {
        text-align: center;
        color: #888;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-left">
        <a href="./index.html" class="logo">✨ 쉬운 글 배움터</a>
        <ul class="main-menu">
          <li><a href="./about.html">서비스 소개</a></li>
          <li><a href="./index.html#top">쉬운 글 변환기</a></li>
          <li><a href="./behavior.html">행동 사전</a></li>
          <li><a href="./read.html">글 읽어주기</a></li>
        </ul>
      </div>
      <div class="header-right">
        <div id="guest-menu">
          <a href="login.html" class="login-btn">로그인</a>
          <a href="signup.html" class="signup-btn">회원가입</a>
        </div>
        <div id="user-menu">
          <span id="user-info">사용자님, 환영합니다!</span>
          <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
        </div>
      </div>
    </header>

    <div class="wrapper">
      <div class="card">
        <h2>🤝 행동 사전</h2>
        <div id="loading"></div>
        <div class="quiz-area">
          <p id="question"></p>
          <div id="options"></div>
        </div>
        <div class="result-area">
          <p id="result"></p>
          <div class="next-area">
            <button id="nextBtn" class="next-btn-bottom" onclick="generateProblem()">
              다음 문제 ➡
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let usedQuestions = [];
  let currentUserLevel = "1"; // 기본값 (경계선 지능)

  window.onload = async function() {
    try {
      const response = await fetch('/api/check-auth');
      if (response.ok) {
        const userData = await response.json();
        localStorage.setItem('currentUser', userData.name);
        
        // index.html의 회원가입 단계(1, 2, 3) 값을 가져옴
        if (userData.level) {
          currentUserLevel = userData.level.toString();
          console.log("사용자 수준 확인:", currentUserLevel);
        }
        applyLoggedInUI(userData.name);
      }
    } catch (error) {
      console.error("인증 실패:", error);
    }
    // 페이지 로드 후 즉시 첫 문제 생성
    generateProblem();
  };

  // 수준(1, 2, 3)에 따른 GPT 프롬프트 설정
  function getLevelPrompt(level) {
    switch(level) {
      case "3": // 중증 지적 장애
        return "난이도: 매우 쉬움. '인사하기', '손씻기' 같은 아주 단순한 1단계 상황. 문장은 5단어 이내.";
      case "2": // 경도 지적 장애
        return "난이도: 쉬움. 초등 저학년 수준. 편의점에서 물건 사기, 친구에게 빌린 물건 돌려주기 등 일상 상황.";
      case "1": // 경계선 지능
      default:
        return "난이도: 보통. 경계선 지능 수준. 온라인 예절, 친구와의 오해 풀기 등 약간의 판단이 필요한 상황.";
    }
  }

  // GPT 응답에서 JSON만 뽑아내는 함수
  function safeParse(text) {
    try {
      return JSON.parse(text);
    } catch (e) {
      const match = text.match(/\{[\s\S]*\}/);
      return match ? JSON.parse(match[0]) : null;
    }
  }

  async function generateProblem() {
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");
    const loadingEl = document.getElementById("loading");
    const nextBtn = document.getElementById("nextBtn");

    // 초기화
    questionEl.innerText = "";
    optionsEl.innerHTML = "";
    resultEl.innerText = "";
    loadingEl.innerText = "✨ 맞춤 문제를 만들고 있어요. 잠시만 기다려 주세요...";
    nextBtn.style.display = "none";

    const instruction = getLevelPrompt(currentUserLevel);

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ instruction: instruction }),
      });

      if (!res.ok) throw new Error("네트워크 응답 없음");

      const data = await res.json();
      const quiz = safeParse(data.result);

      if (!quiz) throw new Error("데이터 파싱 실패");

      loadingEl.innerText = "";
      showQuiz(quiz);
      nextBtn.style.display = "block";
      nextBtn.innerText = "다음 문제 ➡";
    } catch (e) {
      console.error(e);
      loadingEl.innerText = "❌ 문제를 가져오지 못했습니다. 인터넷 연결을 확인하거나 다시 시도해 주세요.";
      nextBtn.style.display = "block";
      nextBtn.innerText = "다시 시도하기";
    }
  }

  function showQuiz(q) {
    document.getElementById("question").innerText = q.question;
    const div = document.getElementById("options");
    div.innerHTML = "";
    q.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => {
        // 모든 버튼 비활성화
        document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
        const resDiv = document.getElementById("result");
        if (i === q.answer) {
          btn.classList.add("correct");
          resDiv.innerHTML = "✅ <strong>정답이에요!</strong><br>" + q.explanation;
        } else {
          btn.classList.add("wrong");
          resDiv.innerHTML = "❌ <strong>틀렸어요.</strong><br>" + q.explanation;
        }
      };
      div.appendChild(btn);
    });
  }

  function applyLoggedInUI(userName) {
    const guestMenu = document.getElementById('guest-menu');
    const userMenu = document.getElementById('user-menu');
    const uInfo = document.getElementById('u-info') || document.getElementById('user-info');
    
    if (guestMenu) guestMenu.style.display = 'none';
    if (userMenu) userMenu.style.display = 'flex';
    if (uInfo) uInfo.innerHTML = `✨ <strong>${userName}</strong>님`;
  }

  async function handleLogout() {
    if (confirm("로그아웃 하시겠습니까?")) {
      await fetch('/api/logout', { method: 'POST' });
      localStorage.removeItem('currentUser');
      location.reload();
    }
  }

// UI 전환 함수 (정의되어 있는지 확인)
function applyLoggedInUI(userName) {
    const guestMenu = document.getElementById('guest-menu');
    const userMenu = document.getElementById('user-menu');
    const userInfo = document.getElementById('user-info');

    if (guestMenu) guestMenu.style.display = 'none';
    if (userMenu) userMenu.style.display = 'flex';
    if (userInfo) userInfo.innerHTML = `✨ <strong>${userName}</strong>님`;
}

function applyLoggedOutUI() {
    const guestMenu = document.getElementById('guest-menu');
    const userMenu = document.getElementById('user-menu');

    if (guestMenu) guestMenu.style.display = 'flex';
    if (userMenu) userMenu.style.display = 'none';
}
 async function generateProblem() {
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");
    const loadingEl = document.getElementById("loading");
    const nextBtn = document.getElementById("nextBtn");

    questionEl.innerText = "";
    optionsEl.innerHTML = "";
    resultEl.innerText = "";
    loadingEl.innerText = "맞춤 문제를 만들고 있어요...";
    nextBtn.style.display = "none";

    const levelInstruction = getLevelPrompt(currentUserLevel);

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          level: currentUserLevel, // 서버로 수준 정보 전달
          instruction: levelInstruction
        }),
      });

      if (!res.ok) throw new Error("서버 응답 오류");

      const data = await res.json();
      
      // GPT 응답이 문자열로 올 경우를 대비해 파싱 로직 적용
      let quiz;
      if (typeof data.result === 'string') {
          quiz = safeParse(data.result);
      } else {
          quiz = data.result || data;
      }

      if (!quiz || !quiz.question) throw new Error("데이터 형식 오류");

      loadingEl.innerText = "";
      showQuiz(quiz);
      nextBtn.style.display = "block";
    } catch (e) {
      console.error("문제 생성 에러:", e);
      loadingEl.innerText = "❌ 문제를 불러오지 못했습니다. (API 연결 확인 필요)";
      // 3초 뒤 자동 재시도 버튼 활성화
      nextBtn.style.display = "block";
      nextBtn.innerText = "다시 시도하기";
    }
  }

  // JSON 파싱 안전 함수 (GPT가 앞뒤에 설명을 붙여도 JSON만 찾아냄)
  function safeParse(text) {
    try {
      return JSON.parse(text);
    } catch (e) {
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      return jsonMatch ? JSON.parse(jsonMatch[0]) : null;
    }
  }
</script>
  </body>
</html>
