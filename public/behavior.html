<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>행동 사전</title>

    <style>
      :root {
        --primary-color: #4a90e2;
        --secondary-color: #ffd93d;
        --accent-color: #ff8a5c;
        --bg-color: #fdfbf7;
        --text-color: #333333;
        --white: #ffffff;
        --error-color: #e74c3c;
        --success-color: #2ecc71;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Nanum Gothic", sans-serif;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.8;
        word-break: keep-all;
      }

      header {
        background-color: var(--white);
        padding: 0 5%;
        height: 90px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 40px;
      }
      .logo {
        font-size: 28px;
        font-weight: 800;
        color: var(--primary-color);
        text-decoration: none;
        white-space: nowrap;
      }
      .main-menu {
        display: flex;
        list-style: none;
        gap: 30px;
      }
      .main-menu li a {
        text-decoration: none;
        color: #444;
        font-size: 18px;
        font-weight: 700;
        transition: color 0.2s;
      }
      .main-menu li a:hover {
        color: var(--primary-color);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      #guest-menu {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #user-menu {
        display: none;
        align-items: center;
        gap: 15px;
        font-weight: 700;
      }

      .login-btn,
      .signup-btn,
      .logout-btn {
        cursor: pointer;
        text-decoration: none;
        font-weight: 700;
        border: none;
        font-size: 16px;
      }
      .login-btn {
        background: none;
        color: var(--text-color);
        padding: 10px 15px;
      }
      .signup-btn {
        background-color: var(--primary-color);
        color: white;
        padding: 10px 22px;
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        transition: all 0.2s;
      }
      .logout-btn {
        background-color: #eee;
        color: #666;
        padding: 8px 15px;
        border-radius: 50px;
        font-size: 14px;
      }

      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 80px);
      }

      .card {
        width: 100%;
        max-width: 800px;
        height: 700px;
        background: var(--white);
        border-radius: 30px;
        padding: 30px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .quiz-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-bottom: 120px;
      }

      #question {
        font-size: 22px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 25px;
      }

      #options {
        flex-grow: 1;
        overflow-y: auto;
        max-height: 300px;
      }

      .result-area {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        text-align: center;
      }

      #result {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 15px;
      }

      h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 20px;
      }

      .option-btn {
        width: 100%;
        padding: 20px;
        margin: 10px 0;
        font-size: 20px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        background: #f0f7ff;
        transition: 0.2s;
      }

      .option-btn:hover {
        background: #dbe9ff;
      }

      .correct {
        background: var(--success-color) !important;
        color: white;
      }
      .wrong {
        background: var(--error-color) !important;
        color: white;
      }

      .next-btn-bottom {
        width: 100%;
        padding: 10px;
        font-size: 20px;
        font-weight: 800;
        border: none;
        border-radius: 20px;
        background: var(--primary-color);
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      #loading {
        text-align: center;
        color: #888;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-left">
        <a href="./index.html" class="logo">✨ 쉬운 글 배움터</a>
        <ul class="main-menu">
          <li><a href="./about.html">서비스 소개</a></li>
          <li><a href="./index.html#top">쉬운 글 변환기</a></li>
          <li><a href="./behavior.html">행동 사전</a></li>
          <li><a href="./read.html">글 읽어주기</a></li>
        </ul>
      </div>
      <div class="header-right">
        <div id="guest-menu">
          <a href="login.html" class="login-btn">로그인</a>
          <a href="signup.html" class="signup-btn">회원가입</a>
        </div>
        <div id="user-menu">
          <span id="user-info">사용자님, 환영합니다!</span>
          <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
        </div>
      </div>
    </header>

    <div class="wrapper">
      <div class="card">
        <h2>🤝 행동 사전</h2>
        <div id="loading"></div>
        <div class="quiz-area">
          <p id="question"></p>
          <div id="options"></div>
        </div>
        <div class="result-area">
          <p id="result"></p>
          <div class="next-area">
            <button id="nextBtn" class="next-btn-bottom" onclick="generateProblem()">
              다음 문제 ➡
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
 let usedQuestions = [];
  let currentUserLevel = "경계선"; // 기본값 설정

  // 페이지 로드 시 실행되는 통합 함수
  window.onload = async function() {
    // 1. 로그인 상태 확인 및 수준(level) 가져오기
    try {
      const response = await fetch('/api/check-auth');
      if (response.ok) {
        const userData = await response.json();
        localStorage.setItem('currentUser', userData.name);
        
        // 중요: 서버에서 받아온 사용자의 학습 수준 저장
        if (userData.level) {
          currentUserLevel = userData.level;
          console.log("사용자 맞춤 수준 로드됨:", currentUserLevel);
        }
        
        applyLoggedInUI(userData.name);
      } else {
        localStorage.removeItem('currentUser');
        applyLoggedOutUI();
        // 로그인 안 한 경우 기본값으로 진행하거나 로그인 페이지로 유도
      }
    } catch (error) {
      console.error("인증 확인 실패:", error);
    }

    // 2. 수준이 로드된 후 문제 생성 시작
    generateProblem();
  };

  // UI 업데이트 함수
  function applyLoggedInUI(userName) {
    document.getElementById('guest-menu').style.display = 'none';
    document.getElementById('user-menu').style.display = 'flex';
    document.getElementById('user-info').innerHTML = `✨ <strong>${userName}</strong>님`;
  }

  function applyLoggedOutUI() {
    document.getElementById('guest-menu').style.display = 'flex';
    document.getElementById('user-menu').style.display = 'none';
  }

  // 로그아웃 처리
  async function handleLogout() {
    if (confirm("정말 로그아웃 하시겠습니까?")) {
      await fetch('/api/logout', { method: 'POST' });
      localStorage.removeItem('currentUser');
      location.reload();
    }
  }

  // 수준별 GPT 프롬프트 지침 생성
  function getLevelPrompt(level) {
    if (level === "매우 쉬움" || level === "중도") {
      return "아주 단순한 상황(예: 길을 잃었을 때, 화장실 가고 싶을 때). 문장은 5단어 이내로 짧게 작성. 선택지는 아주 명확하게.";
    } else if (level === "쉬움" || level === "경도") {
      return "초등학교 저학년 수준의 사회적 상황. 일상적인 대화나 예절 관련 문제. 이해하기 쉬운 단어 사용.";
    } else {
      // 보통 또는 경계선 지능
      return "중학생 수준의 사회적 상황. 친구와의 갈등, 온라인 예절, 경제 활동 등 약간의 판단력이 필요한 상황 포함.";
    }
  }

  async function generateProblem() {
    document.getElementById("question").innerText = "";
    document.getElementById("options").innerHTML = "";
    document.getElementById("result").innerText = "";
    document.getElementById("loading").innerText = "맞춤 문제를 만들고 있어요...";
    document.getElementById("nextBtn").style.display = "none";

    const levelInstruction = getLevelPrompt(currentUserLevel);

    try {
      const res = await fetch("/api/generate", { // Vercel의 gpt 호출 엔드포인트
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [
            { role: "system", content: "발달장애인 및 경계선 지능인을 위한 사회성 교육 퀴즈 생성기입니다. 반드시 JSON 형식으로 답변하세요: { \"question\": \"\", \"options\": [\"\", \"\", \"\"], \"answer\": 0, \"explanation\": \"\" }" },
            { role: "user", content: `다음 난이도 지침에 맞춰 문제를 생성해줘: ${levelInstruction}` }
          ],
        }),
      });

      const data = await res.json();
      // data.choices[0].message.content 를 파싱하여 사용 (서버 환경에 따라 data.result 등 조절)
      const quiz = JSON.parse(data.choices[0].message.content);

      document.getElementById("loading").innerText = "";
      showQuiz(quiz);
      document.getElementById("nextBtn").style.display = "block";
    } catch (e) {
      console.error(e);
      document.getElementById("loading").innerText = "문제를 불러오지 못했습니다. 다시 시도해 주세요.";
    }
  }

  function showQuiz(q) {
    document.getElementById("question").innerText = q.question;
    const div = document.getElementById("options");
    div.innerHTML = "";
    q.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => check(i, q, btn);
      div.appendChild(btn);
    });
  }

  function check(i, q, btn) {
    document.querySelectorAll(".option-btn").forEach((b) => (b.disabled = true));
    if (i === q.answer) {
      btn.classList.add("correct");
      document.getElementById("result").innerHTML = "✅ <strong>정답이에요!</strong><br>" + q.explanation;
    } else {
      btn.classList.add("wrong");
      document.getElementById("result").innerHTML = "❌ <strong>아쉬워요.</strong><br>" + q.explanation;
    }
  }

  function safeParse(text) {
    try { return JSON.parse(text); } 
    catch { const match = text.match(/\{[\s\S]*\}/); return match ? JSON.parse(match[0]) : null; }
  }
</script>
  </body>
</html>
