<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉬운 글 배움터 - Easy Read</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        /* 기존 스타일 유지 */
        :root { --primary: #4a90e2; --secondary: #ffd93d; --bg: #fdfbf7; --text: #333; --white: #fff; --error: #e74c3c; --success: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.8; word-break: keep-all; }
        header { background: var(--white); padding: 0 5%; height: 90px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-menu a { text-decoration: none; color: #555; font-weight: 700; font-size: 16px; transition: 0.2s; white-space: nowrap; }
        .nav-menu a:hover { color: var(--primary); }
        .header-right { display: flex; gap: 15px; align-items: center; }
        #user-menu { display: none; gap: 15px; font-weight: 700; align-items: center; }
        .btn { cursor: pointer; border: none; border-radius: 50px; font-weight: 700; transition: 0.2s; text-decoration: none; display: inline-block; font-size: 16px; text-align: center; }
        .btn-primary { background: var(--primary); color: #fff; padding: 12px 25px; }
        .btn-outline { background: none; padding: 10px 15px; color: var(--text); }
        .btn-sub { background: #eee; color: #666; padding: 8px 15px; font-size: 14px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 35px; border-radius: 30px; width: 95%; max-width: 480px; position: relative; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 16px; }
        .hero { text-align: center; padding: 100px 20px; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); }
        .container { max-width: 1100px; margin: -50px auto 60px; padding: 0 20px; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .card { background: #fff; padding: 40px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); text-align: center; transition: 0.3s; }
        .highlight { background: var(--secondary); border-radius: 6px; }
        .word { display: inline-block; white-space: pre-wrap; font-size: 24px; }
        textarea { width: 100%; border: 2px solid #eee; border-radius: 20px; padding: 20px; font-size: 18px; resize: none; margin-top: 15px; background: #fafafa; }
        footer { text-align: center; padding: 60px; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/" class="logo">✨ 쉬운 글 배움터</a>
            <ul class="nav-menu">
                <li><a href="#intro">서비스 소개</a></li>
                <li><a href="#tts">글 읽어주기</a></li>
                <li><a href="#easy-convert">쉬운 글 변환</a></li>
                <li><a href="#behavior-dict">행동 사전</a></li>
            </ul>
        </div>
        <div class="header-right">
            <div id="guest-menu">
                <button class="btn btn-outline" onclick="openM('loginModal')">로그인</button>
                <button class="btn btn-primary" onclick="openM('signupModal')">회원가입</button>
            </div>
            <div id="user-menu">
                <span id="u-info"></span>
                <button class="btn btn-sub" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </header>

    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2>회원가입</h2>
            <form id="signupF">
                <div class="form-group"><label>아이디</label><input type="text" id="rId" required></div>
                <div class="form-group"><label>비밀번호</label><input type="password" id="rPw" required></div>
                <div class="form-group"><label>이름</label><input type="text" id="rName" required></div>
                <div class="form-group"><label>생년월일</label><input type="date" id="rBirth" required></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">가입하기</button>
            </form>
            <button onclick="closeM('signupModal')" style="margin-top: 10px; background: none; border: none; color: #999; cursor: pointer;">닫기</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>로그인</h2>
            <form id="loginF">
                <div class="form-group"><label>아이디</label><input type="text" id="lId" required></div>
                <div class="form-group"><label>비밀번호</label><input type="password" id="lPw" required></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">로그인하기</button>
            </form>
            <button onclick="closeM('loginModal')" style="margin-top: 10px; background: none; border: none; color: #999; cursor: pointer;">닫기</button>
        </div>
    </div>

    <section class="hero">
        <h1 id="wTitle">누구나 읽기 쉬운 세상을 만듭니다</h1>
        <p>복잡한 글은 쉽게 바꾸고, 모르는 행동은 사전에서 찾아보세요.</p>
    </section>

    <main class="container">
        </main>

    <script>
        // 1. 모달 열기/닫기 함수
        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        // 2. 회원가입 처리
        document.getElementById('signupF').onsubmit = async (e) => {
            e.preventDefault();
            const userData = {
                userId: document.getElementById('rId').value,
                pw: document.getElementById('rPw').value,
                name: document.getElementById('rName').value,
                birth: document.getElementById('rBirth').value
            };

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (res.ok) {
                alert("가입 성공! 로그인해주세요.");
                closeM('signupModal');
                openM('loginModal');
            } else {
                alert("가입 실패. 아이디를 확인하세요.");
            }
        };

        // 3. 로그인 처리
        document.getElementById('loginF').onsubmit = async (e) => {
            e.preventDefault();
            const loginData = {
                userId: document.getElementById('lId').value,
                pw: document.getElementById('lPw').value
            };

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            });

            const data = await res.json();
            if (res.ok) {
                // 로그인 성공 시 UI 변경
                document.getElementById('guest-menu').style.display = 'none';
                document.getElementById('user-menu').style.display = 'flex';
                document.getElementById('u-info').textContent = `✨ ${data.user.name}님 반가워요!`;
                document.getElementById('wTitle').textContent = `${data.user.name}님, 무엇을 읽어드릴까요?`;
                closeM('loginModal');
            } else {
                alert(data.message || "로그인 실패");
            }
        };

        // 4. 로그아웃 처리
        function handleLogout() {
            location.reload(); // 단순하게 새로고침으로 세션 초기화 효과
        }

        // 5. TTS 기능 (기본 구현)
        function speak() {
            const txt = document.getElementById('tIn').value;
            if (!txt) return;
            const utter = new SpeechSynthesisUtterance(txt);
            utter.lang = 'ko-KR';
            utter.rate = document.getElementById('tRate').value;
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>
