<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉬운 글 배움터 - Easy Read</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        /* =========================================
           1. 기본 스타일 및 변수 설정
        ========================================= */
        :root { 
            --primary: #4a90e2; 
            --secondary: #ffd93d; 
            --bg: #fdfbf7; 
            --text: #333; 
            --white: #fff; 
            --error: #e74c3c; 
            --success: #2ecc71; 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Nanum Gothic", sans-serif; 
        }
        
        html { 
            scroll-behavior: smooth; 
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.8; 
            word-break: keep-all; 
        }
        
        /* =========================================
           2. 헤더 및 네비게이션 영역
        ========================================= */
        header { 
            background: var(--white); 
            padding: 0 5%; 
            height: 90px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        
        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 30px; 
        }
        
        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--primary); 
            text-decoration: none; 
        }
        
        .nav-menu { 
            display: flex; 
            list-style: none; 
            gap: 20px; 
        }
        
        .nav-menu a { 
            text-decoration: none; 
            color: #555; 
            font-weight: 700; 
            font-size: 16px; 
            transition: 0.2s; 
        }
        
        .nav-menu a:hover { 
            color: var(--primary); 
        }
        
        /* 로그인 전/후 메뉴 컨테이너 */
        .header-right { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
        }
        
        #user-menu { 
            display: none; 
            gap: 15px; 
            align-items: center; 
        }
        
        #u-info { 
            font-weight: 700; 
            color: #333; 
            font-size: 16px; 
        }

        /* =========================================
           3. 공통 버튼 스타일
        ========================================= */
        .btn { 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            font-weight: 700; 
            transition: 0.2s; 
            display: inline-block; 
            font-size: 16px; 
            text-align: center; 
        }
        
        .btn-primary { 
            background: var(--primary); 
            color: #fff; 
            padding: 12px 25px; 
        }
        
        .btn-primary:hover { 
            background: #357abd; 
        }
        
        .btn-sub { 
            background: #eee; 
            color: #666; 
            padding: 8px 15px; 
            font-size: 14px; 
        }
        
        .btn-outline { 
            background: none; 
            padding: 10px 15px; 
            color: var(--text); 
        }
        
        .text-link { 
            color: #666; 
            font-size: 13px; 
            text-decoration: underline; 
            cursor: pointer; 
            background: none; 
            border: none; 
            font-weight: bold; 
        }

        /* =========================================
           4. 모달 창 및 폼 스타일
        ========================================= */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            justify-content: center; 
            align-items: center; 
        }
        
        .modal-content { 
            background: #fff; 
            padding: 35px; 
            border-radius: 30px; 
            width: 95%; 
            max-width: 500px; 
            max-height: 85vh; 
            overflow-y: auto; 
            position: relative; 
        }
        
        .form-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }
        
        .form-group label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 6px; 
            font-size: 14px; 
        }
        
        .form-group input, 
        .form-group select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            outline: none; 
            font-size: 16px; 
        }
        
        /* 폼 유효성 메시지 */
        .status-msg { 
            font-size: 12px; 
            margin-top: 5px; 
            font-weight: bold; 
        }
        
        .valid { 
            color: var(--success); 
        }
        
        .invalid { 
            color: var(--error); 
        }

        /* 계정 찾기 탭 버튼 */
        .tab-buttons { 
            display: flex; 
            border-bottom: 2px solid #eee; 
            margin-bottom: 20px; 
        }
        
        .tab-btn { 
            flex: 1; 
            padding: 10px; 
            background: none; 
            border: none; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #999; 
        }
        
        .tab-btn.active { 
            color: var(--primary); 
            border-bottom: 3px solid var(--primary); 
        }

        /* =========================================
           5. TTS (읽어주기) 메인 콘텐츠 영역
        ========================================= */
        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }
        
        .card { 
            background: #fff; 
            padding: 40px; 
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.06); 
            margin-bottom: 30px; 
        }
        
        .word { 
            display: inline-block; 
            padding: 0 4px; 
            border-radius: 8px; 
            font-size: 24px; 
            font-weight: 800; 
            transition: all 0.1s ease; 
            color: #444; 
        }
        
        .highlight { 
            background-color: var(--secondary); 
            transform: scale(1.15); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            color: #000; 
            z-index: 10; 
        }
        
        textarea { 
            width: 100%; 
            border: 2px solid #eee; 
            border-radius: 20px; 
            padding: 20px; 
            font-size: 18px; 
            resize: none; 
            background: #fafafa; 
            outline: none; 
        }
        
        .voice-select { 
            padding: 8px; 
            border-radius: 10px; 
            border: 2px solid #eee; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="/" class="logo">✨ 쉬운 글 배움터</a>
            <ul class="nav-menu">
                <li><a href="#tts">글 읽어주기</a></li>
            </ul>
        </div>
        
        <div class="header-right">
            <div id="guest-menu">
                <button class="btn btn-outline" onclick="openModal('loginModal')">로그인</button>
                <button class="btn btn-primary" onclick="openModal('signupModal')">회원가입</button>
            </div>
            
            <div id="user-menu">
                <span id="u-info"></span>
                <button class="btn btn-sub" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="tts" class="card">
            <h2>🔊 문단 읽어주기</h2>
            <p style="color: #666; margin-bottom: 10px;">소리가 나는 곳에 <strong>노란색 형광펜</strong>이 따라갑니다.</p>
            
            <textarea id="ttsInput" rows="5" placeholder="읽고 싶은 내용을 입력해 보세요."></textarea>
            
            <div style="margin-top:20px; display:flex; gap:15px; align-items:center; flex-wrap: wrap; background: #f9f9f9; padding: 20px; border-radius: 20px;">
                <button onclick="startTTS()" class="btn btn-primary">▶ 읽기 시작</button>
                <button onclick="stopTTS()" class="btn btn-sub">⏹ 정지</button>
                
                <div>
                    <label style="font-size:14px; font-weight: 700;">목소리: </label>
                    <select id="voiceType" class="voice-select">
                        <option value="adult">친근한 성인</option>
                        <option value="child">귀여운 아이</option>
                    </select>
                </div>

                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:14px; font-weight: 700;">속도: </label>
                    <input type="range" id="ttsRate" min="0.5" max="1.5" step="0.1" value="0.8">
                    <span id="rateValue" style="font-weight:800; color:var(--primary);">0.8배속</span>
                </div>
            </div>

            <div id="ttsOutput" style="margin-top:30px; min-height:150px; padding:35px; background:#fff; border:2px dashed #adcfff; border-radius:30px; line-height: 2.8;">
                <span style="color:#bbb;">내용을 입력하면 여기에 실시간 읽기 가이드가 표시됩니다.</span>
            </div>
        </div>
    </main>

    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary);">회원가입</h2>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>성함</label>
                    <input type="text" id="regName" required>
                </div>
                
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="regId" required>
                </div>
                
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="regPw" placeholder="8자 이상, 특수문자 필수" required oninput="validatePassword()">
                    <div id="pwMessage" class="status-msg"></div>
                </div>

                <div class="form-group">
                    <label>이메일 인증</label>
                    <div style="display:flex; gap:10px;">
                        <input type="email" id="regEmail" placeholder="example@gmail.com" required>
                        <button type="button" class="btn btn-sub" id="emailSendBtn" onclick="sendEmailCode()">코드받기</button>
                    </div>
                </div>
                
                <div id="emailAuthArea" class="form-group" style="display:none;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="emailCodeInput" placeholder="6자리 번호">
                        <button type="button" class="btn btn-primary" onclick="verifyEmailCode()">확인</button>
                    </div>
                    <div id="emailMessage" class="status-msg"></div>
                </div>

                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <input type="tel" id="regPhone" placeholder="010-0000-0000" maxlength="13" required oninput="formatPhoneNumber(this)">
                </div>

                <div class="form-group">
                    <label>생년월일</label>
                    <input type="date" id="regBirth" required onchange="validatePassword()">
                </div>
                
                <div class="form-group">
                    <label>학습 단계</label>
                    <select id="regLevel" required>
                        <option value="1">경계선 지능</option>
                        <option value="2">경도 지적 장애</option>
                        <option value="3">중증 지적 장애</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px; padding: 15px;">가입 완료</button>
            </form>
            
            <button onclick="closeModal('signupModal')" style="margin-top:15px; border:none; background:none; color:#999; cursor:pointer; width:100%;">취소</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">로그인</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="loginId" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPw" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding: 15px;">로그인하기</button>
            </form>
            
            <div style="margin-top: 15px; text-align: center;">
                <button class="text-link" onclick="closeModal('loginModal'); openModal('findAccountModal')">아이디 / 비밀번호를 잊으셨나요?</button>
            </div>
            
            <button onclick="closeModal('loginModal')" style="margin-top:15px; border:none; background:none; color:#999; cursor:pointer; width:100%;">닫기</button>
        </div>
    </div>

    <div id="findAccountModal" class="modal">
        <div class="modal-content">
            <div class="tab-buttons">
                <button id="tabFindIdBtn" class="tab-btn active" onclick="switchFindAccountTab('id')">아이디 찾기</button>
                <button id="tabFindPwBtn" class="tab-btn" onclick="switchFindAccountTab('pw')">비밀번호 찾기</button>
            </div>

            <form id="findIdForm">
                <p style="font-size: 14px; color: #666; margin-bottom: 15px;">가입 시 등록한 이름과 이메일을 입력해 주세요.</p>
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="findIdName" required>
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="findIdEmail" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding: 15px;">아이디 찾기</button>
            </form>

            <form id="findPwForm" style="display: none;">
                <p style="font-size: 14px; color: #666; margin-bottom: 15px;">가입 정보를 입력하시면 이메일로 <strong>임시 비밀번호</strong>를 발송해 드립니다.</p>
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="findPwId" required>
                </div>
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="findPwName" required>
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="findPwEmail" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding: 15px;" id="submitFindPwBtn">임시 비밀번호 발급</button>
            </form>

            <button onclick="closeModal('findAccountModal')" style="margin-top:15px; border:none; background:none; color:#999; cursor:pointer; width:100%;">닫기</button>
        </div>
    </div>

    <script>
        // 전역 상태 변수 (이메일 인증용)
        let generatedServerCode = ""; 
        let isEmailSuccessfullyVerified = false;

        // -----------------------------------------
        // 1. 공통 유틸리티 함수
        // -----------------------------------------
        function openModal(modalId) { 
            document.getElementById(modalId).style.display = 'flex'; 
        }
        
        function closeModal(modalId) { 
            document.getElementById(modalId).style.display = 'none'; 
        }

        // 로그인 UI 적용 함수
        function applyLoggedInUI(userName) {
            document.getElementById('guest-menu').style.display = 'none';
            document.getElementById('user-menu').style.display = 'flex';
            document.getElementById('u-info').innerHTML = `✨ <strong>${userName}</strong>님, 환영합니다!`;
        }

        // -----------------------------------------
        // 2. 초기 로드 시 로그인 상태 검증
        // -----------------------------------------
        window.onload = async function() {
            try {
                const response = await fetch('/api/check-auth');
                if (response.ok) {
                    const userData = await response.json();
                    applyLoggedInUI(userData.name);
                }
            } catch (error) { 
                console.error("사용자가 비로그인 상태이거나 검증에 실패했습니다."); 
            }
        };

        // -----------------------------------------
        // 3. 로그인 및 로그아웃 로직
        // -----------------------------------------
        document.getElementById('loginForm').onsubmit = async function(event) {
            event.preventDefault();
            
            const userId = document.getElementById('loginId').value;
            const userPw = document.getElementById('loginPw').value;

            try {
                const response = await fetch('/api/login', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ userId: userId, pw: userPw }) 
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    closeModal('loginModal');
                    applyLoggedInUI(data.name);
                    document.getElementById('loginForm').reset();
                } else { 
                    alert(data.message || "아이디 혹은 비밀번호가 일치하지 않습니다."); 
                }
            } catch (error) { 
                alert("서버 통신 중 오류가 발생했습니다."); 
            }
        };

        async function handleLogout() {
            if (confirm("정말 로그아웃 하시겠습니까?")) {
                await fetch('/api/logout', { method: 'POST' });
                location.reload();
            }
        }

        // -----------------------------------------
        // 4. 회원가입 유효성 검사 로직
        // -----------------------------------------
        
        // 휴대폰 번호 하이픈 자동 삽입
        function formatPhoneNumber(inputElement) {
            let number = inputElement.value.replace(/[^0-9]/g, '');
            inputElement.value = number
                .replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3")
                .replace(/(\-{1,2})$/g, "");
        }

        // 비밀번호 강도 및 규칙 실시간 검사
        function validatePassword() {
            const password = document.getElementById('regPw').value;
            const birthDate = document.getElementById('regBirth').value.replace(/-/g, "");
            const messageElement = document.getElementById('pwMessage');
            
            // 특수문자 정규식
            const specialCharacterPattern = /[\{\}\[\]\/?.,;:|\)*~`!^\-_+<>@\#$%&\\\=\(\'\"]/;

            if (password === "") { 
                messageElement.innerText = ""; 
                return; 
            }

            if (password.length < 8) { 
                messageElement.innerText = "❌ 비밀번호는 8자 이상 입력해야 합니다."; 
                messageElement.className = "status-msg invalid"; 
            } else if (!specialCharacterPattern.test(password)) { 
                messageElement.innerText = "❌ 비밀번호에 특수문자가 최소 1개 포함되어야 합니다."; 
                messageElement.className = "status-msg invalid"; 
            } else if (birthDate !== "" && password.includes(birthDate)) { 
                messageElement.innerText = "❌ 안전을 위해 비밀번호에 생년월일을 포함할 수 없습니다."; 
                messageElement.className = "status-msg invalid"; 
            } else { 
                messageElement.innerText = "✅ 안전한 비밀번호입니다!"; 
                messageElement.className = "status-msg valid"; 
            }
        }

        // -----------------------------------------
        // 5. 이메일 인증 로직
        // -----------------------------------------
        async function sendEmailCode() {
            const emailInput = document.getElementById('regEmail').value;
            const buttonElement = document.getElementById('emailSendBtn');
            
            if (emailInput.indexOf('@') === -1) {
                alert("이메일 형식을 정확히 입력해 주세요.");
                return;
            }
            
            buttonElement.innerText = "발송 중...";
            buttonElement.disabled = true;
            
            try {
                const response = await fetch('/api/send-email', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ email: emailInput }) 
                });
                
                if (response.ok) {
                    const data = await response.json(); 
                    generatedServerCode = data.code;
                    document.getElementById('emailAuthArea').style.display = 'block'; 
                    alert("인증번호가 해당 이메일로 발송되었습니다!");
                } else {
                    alert("이메일 발송에 실패했습니다. 이메일 주소를 확인해주세요.");
                }
            } catch (error) {
                alert("이메일 발송 중 오류가 발생했습니다.");
            } finally {
                buttonElement.innerText = "재발송";
                buttonElement.disabled = false;
            }
        }

        function verifyEmailCode() {
            const userInputCode = document.getElementById('emailCodeInput').value;
            const messageElement = document.getElementById('emailMessage');

            if (userInputCode === generatedServerCode && generatedServerCode !== "") {
                isEmailSuccessfullyVerified = true;
                messageElement.innerText = "✅ 인증 성공"; 
                messageElement.className = "status-msg valid";
                
                // 이메일을 변경하지 못하도록 읽기 전용으로 설정
                document.getElementById('regEmail').readOnly = true;
                document.getElementById('emailCodeInput').readOnly = true;
            } else { 
                alert("인증번호가 일치하지 않습니다. 다시 확인해 주세요."); 
            }
        }

        // -----------------------------------------
        // 6. 회원가입 제출 로직
        // -----------------------------------------
        document.getElementById('signupForm').onsubmit = async function(event) {
            event.preventDefault();
            
            const pwStatusMessage = document.getElementById('pwMessage').innerText;
            
            // 유효성 검증 재확인
            if (pwStatusMessage.includes("❌")) {
                alert("비밀번호가 보안 규칙을 충족하지 않습니다. 확인해 주세요.");
                return;
            }
            if (isEmailSuccessfullyVerified === false) {
                alert("이메일 인증 절차를 완료해 주세요.");
                return;
            }
            
            const payload = {
                userId: document.getElementById('regId').value, 
                pw: document.getElementById('regPw').value,
                email: document.getElementById('regEmail').value, 
                name: document.getElementById('regName').value,
                phone: document.getElementById('regPhone').value, 
                birth: document.getElementById('regBirth').value,
                level: document.getElementById('regLevel').value
            };
            
            try {
                const response = await fetch('/api/signup', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (response.ok) { 
                    alert("회원가입을 진심으로 축하합니다! 로그인해 주세요."); 
                    location.reload(); 
                } else { 
                    alert("회원가입에 실패했습니다. 입력하신 아이디가 이미 존재할 수 있습니다."); 
                }
            } catch (error) {
                alert("서버 연결에 문제가 발생했습니다.");
            }
        };

        // -----------------------------------------
        // 7. 계정 찾기 로직 (아이디 / 임시 비밀번호)
        // -----------------------------------------
        
        // 계정 찾기 탭 전환 함수
        function switchFindAccountTab(tabType) {
            const tabIdBtn = document.getElementById('tabFindIdBtn');
            const tabPwBtn = document.getElementById('tabFindPwBtn');
            const formId = document.getElementById('findIdForm');
            const formPw = document.getElementById('findPwForm');

            if (tabType === 'id') {
                tabIdBtn.classList.add('active');
                tabPwBtn.classList.remove('active');
                formId.style.display = 'block';
                formPw.style.display = 'none';
            } else {
                tabIdBtn.classList.remove('active');
                tabPwBtn.classList.add('active');
                formId.style.display = 'none';
                formPw.style.display = 'block';
            }
        }

        // 아이디 찾기 제출
        document.getElementById('findIdForm').onsubmit = async function(event) {
            event.preventDefault();
            
            const nameValue = document.getElementById('findIdName').value;
            const emailValue = document.getElementById('findIdEmail').value;
            
            try {
                const response = await fetch('/api/find-id', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ name: nameValue, email: emailValue }) 
                });
                
                const data = await response.json();
                
                if (response.ok) { 
                    alert(`요청하신 회원님의 아이디는 [ ${data.userId} ] 입니다.`); 
                } else { 
                    alert(data.message); 
                }
            } catch (error) {
                alert("아이디 찾기 요청 중 오류가 발생했습니다.");
            }
        };

        // 비밀번호 찾기(임시 비밀번호 발급) 제출
        document.getElementById('findPwForm').onsubmit = async function(event) {
            event.preventDefault();
            
            const buttonElement = document.getElementById('submitFindPwBtn');
            buttonElement.innerText = "이메일 발송 중..."; 
            buttonElement.disabled = true;

            const userIdValue = document.getElementById('findPwId').value;
            const nameValue = document.getElementById('findPwName').value;
            const emailValue = document.getElementById('findPwEmail').value;
            
            try {
                const response = await fetch('/api/find-pw', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ userId: userIdValue, name: nameValue, email: emailValue }) 
                });
                
                const data = await response.json();
                
                if (response.ok) { 
                    alert(data.message); 
                    closeModal('findAccountModal');
                } else { 
                    alert(data.message); 
                }
            } catch (error) {
                alert("임시 비밀번호 발급 중 오류가 발생했습니다.");
            } finally {
                buttonElement.innerText = "임시 비밀번호 발급"; 
                buttonElement.disabled = false;
            }
        };

        // -----------------------------------------
        // 8. TTS (텍스트 읽어주기 및 하이라이팅) 로직
        // -----------------------------------------
        
        // 속도 조절 슬라이더 UI 텍스트 업데이트
        document.getElementById('ttsRate').addEventListener('input', function() { 
            document.getElementById('rateValue').innerText = this.value + "배속"; 
        });

        // 음성 읽기 시작
        function startTTS() {
            const rawText = document.getElementById('ttsInput').value.trim();
            const outputArea = document.getElementById('ttsOutput');
            
            if (rawText === "") {
                alert("읽어드릴 내용을 먼저 텍스트 창에 입력해주세요.");
                return;
            }

            // 혹시 재생 중인 음성이 있다면 취소
            window.speechSynthesis.cancel();
            
            // 입력된 텍스트를 공백(띄어쓰기) 기준으로 배열로 분할
            const textWords = rawText.split(/(\s+)/);
            
            // 분할된 단어들을 <span> 태그로 감싸서 화면에 렌더링
            let htmlContent = "";
            for (let i = 0; i < textWords.length; i++) {
                const word = textWords[i];
                if (word.trim() !== "") {
                    htmlContent += `<span id="word-${i}" class="word">${word}</span>`;
                } else {
                    htmlContent += word;
                }
            }
            outputArea.innerHTML = htmlContent;

            // 음성 합성 객체 생성
            const utterance = new SpeechSynthesisUtterance(rawText);
            utterance.lang = 'ko-KR'; 
            utterance.rate = parseFloat(document.getElementById('ttsRate').value);
            
            // 아동 목소리 선택 시 피치(음높이)를 높게 설정하여 귀엽게 처리
            if (document.getElementById('voiceType').value === 'child') {
                utterance.pitch = 1.5;
            } else {
                utterance.pitch = 1.0;
            }

            // 단어를 읽을 때마다 발생하는 이벤트
            utterance.onboundary = function(event) {
                if (event.name === 'word') {
                    const currentCharIndex = event.charIndex; 
                    let characterCount = 0;
                    
                    for (let i = 0; i < textWords.length; i++) {
                        const wordElement = document.getElementById(`word-${i}`);
                        const wordLength = textWords[i].length;
                        
                        if (wordElement) {
                            // 현재 읽고 있는 인덱스의 단어를 찾아 하이라이팅 적용
                            if (characterCount <= currentCharIndex && currentCharIndex < characterCount + wordLength) {
                                wordElement.classList.add('highlight'); 
                                
                                // 화면이 해당 단어를 따라 스크롤되도록 처리
                                wordElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            } else { 
                                wordElement.classList.remove('highlight'); 
                            }
                        }
                        characterCount += wordLength;
                    }
                }
            };
            
            // 낭독이 끝나면 모든 하이라이팅 제거
            utterance.onend = function() { 
                const allWords = document.querySelectorAll('.word');
                for(let i = 0; i < allWords.length; i++){
                    allWords[i].classList.remove('highlight');
                }
            };
            
            // 음성 재생 명령
            window.speechSynthesis.speak(utterance);
        }

        // 음성 읽기 정지
        function stopTTS() { 
            window.speechSynthesis.cancel(); 
            const allWords = document.querySelectorAll('.word');
            for(let i = 0; i < allWords.length; i++){
                allWords[i].classList.remove('highlight');
            }
        }
    </script>
</body>
</html>
