<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉬운 글 배움터 - Easy Read</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        :root { 
            --primary: #4a90e2; --secondary: #ffd93d; --bg: #fdfbf7; 
            --text: #333; --white: #fff; --error: #e74c3c; --success: #2ecc71; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.8; word-break: keep-all; }
        
        /* 헤더 및 메뉴 */
        header { background: var(--white); padding: 0 5%; height: 90px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-menu a { text-decoration: none; color: #555; font-weight: 700; font-size: 16px; transition: 0.2s; }
        .nav-menu a:hover { color: var(--primary); }
        
        .header-right { display: flex; gap: 15px; align-items: center; }
        #user-menu { display: none; gap: 15px; font-weight: 700; align-items: center; }

        /* 버튼 스타일 */
        .btn { cursor: pointer; border: none; border-radius: 50px; font-weight: 700; transition: 0.2s; display: inline-block; font-size: 16px; text-align: center; }
        .btn-primary { background: var(--primary); color: #fff; padding: 12px 25px; }
        .btn-sub { background: #eee; color: #666; padding: 8px 15px; font-size: 14px; }
        .btn-outline { background: none; padding: 10px 15px; color: var(--text); }

        /* 모달 및 폼 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 35px; border-radius: 30px; width: 95%; max-width: 500px; max-height: 85vh; overflow-y: auto; position: relative; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 16px; }
        
        /* 실시간 검사 메시지 */
        .status-msg { font-size: 12px; margin-top: 5px; font-weight: bold; }
        .valid { color: var(--success); }
        .invalid { color: var(--error); }

        /* TTS 하이라이팅 가이드 */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; padding: 40px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); margin-bottom: 30px; }
        .word { display: inline-block; padding: 0 4px; border-radius: 8px; font-size: 24px; font-weight: 800; transition: all 0.1s ease; color: #444; }
        .highlight { background-color: var(--secondary); transform: scale(1.15); box-shadow: 0 4px 8px rgba(0,0,0,0.1); color: #000; z-index: 10; }
        textarea { width: 100%; border: 2px solid #eee; border-radius: 20px; padding: 20px; font-size: 18px; resize: none; background: #fafafa; outline: none; }
        .voice-select { padding: 8px; border-radius: 10px; border: 2px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="/" class="logo">✨ 쉬운 글 배움터</a>
            <ul class="nav-menu">
                <li><a href="#intro">서비스 소개</a></li>
                <li><a href="#tts">글 읽어주기</a></li>
                <li><a href="#easy-convert">쉬운 글 변환</a></li>
            </ul>
        </div>
        <div class="header-right">
            <div id="guest-menu">
                <button class="btn btn-outline" onclick="openM('loginModal')">로그인</button>
                <button class="btn btn-primary" onclick="openM('signupModal')">회원가입</button>
            </div>
            <div id="user-menu">
                <span id="u-info"></span>
                <button class="btn btn-sub" onclick="location.reload()">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="tts" class="card">
            <h2>🔊 문단 읽어주기</h2>
            <p style="color: #666; margin-bottom: 10px;">소리가 나는 곳에 <strong>노란색 형광펜</strong>이 따라갑니다.</p>
            <textarea id="tIn" rows="5" placeholder="읽고 싶은 내용을 입력해 보세요."></textarea>
            
            <div style="margin-top:20px; display:flex; gap:15px; align-items:center; flex-wrap: wrap; background: #f9f9f9; padding: 20px; border-radius: 20px;">
                <button onclick="handleSpeak()" class="btn btn-primary">▶ 읽기 시작</button>
                <button onclick="stopSpeak()" class="btn btn-sub">⏹ 정지</button>
                
                <div>
                    <label style="font-size:14px; font-weight: 700;">목소리: </label>
                    <select id="voiceType" class="voice-select">
                        <option value="adult">친근한 성인</option>
                        <option value="child">귀여운 아이</option>
                    </select>
                </div>

                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:14px; font-weight: 700;">속도: </label>
                    <input type="range" id="tRate" min="0.5" max="1.5" step="0.1" value="0.8">
                    <span id="rateVal" style="font-weight:800; color:var(--primary);">0.8배속</span>
                </div>
            </div>

            <div id="tOut" style="margin-top:30px; min-height:150px; padding:35px; background:#fff; border:2px dashed #adcfff; border-radius:30px; line-height: 2.8;">
                <span style="color:#bbb;">내용을 입력하면 여기에 실시간 읽기 가이드가 표시됩니다.</span>
            </div>
        </div>
    </main>

    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary);">회원가입</h2>
            <form id="signupF">
                <div class="form-group"><label>성함</label><input type="text" id="rName" required></div>
                <div class="form-group"><label>아이디</label><input type="text" id="rId" required></div>
                
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="rPw" placeholder="8자 이상, 특수문자 필수" required oninput="checkPw()">
                    <div id="pwMsg" class="status-msg"></div>
                </div>

                <div class="form-group">
                    <label>이메일 인증</label>
                    <div style="display:flex; gap:10px;">
                        <input type="email" id="rEmail" placeholder="example@gmail.com" required>
                        <button type="button" class="btn btn-sub" id="emailBtn" onclick="sendAuthEmail()">코드받기</button>
                    </div>
                </div>
                <div id="emailAuthField" class="form-group" style="display:none;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="rEmailCode" placeholder="6자리 번호">
                        <button type="button" class="btn btn-primary" onclick="verifyEmail()">확인</button>
                    </div>
                    <div id="emailMsg" class="status-msg"></div>
                </div>

                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <input type="tel" id="rPhone" placeholder="010-0000-0000" maxlength="13" required oninput="autoHyphen(this)">
                </div>

                <div class="form-group"><label>생년월일</label><input type="date" id="rBirth" required onchange="checkPw()"></div>
                
                <div class="form-group">
                    <label>학습 단계</label>
                    <select id="rLevel" required>
                        <option value="1">1단계: 천천히 배워요</option>
                        <option value="2">2단계: 도움이 필요해요</option>
                        <option value="3">3단계: 함께 배워요</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px; padding: 15px;">가입 완료</button>
            </form>
            <button onclick="closeM('signupModal')" style="margin-top:15px; border:none; background:none; color:#999; cursor:pointer; width:100%;">취소</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">로그인</h2>
            <form id="loginF">
                <div class="form-group"><label>아이디</label><input type="text" id="lId" required></div>
                <div class="form-group"><label>비밀번호</label><input type="password" id="lPw" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding: 15px;">로그인하기</button>
            </form>
            <button onclick="closeM('loginModal')" style="margin-top:10px; border:none; background:none; color:#999; cursor:pointer; width:100%;">닫기</button>
        </div>
    </div>

    <script>
        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        // 1. 휴대폰 자동 하이픈 (-)
        function autoHyphen(target) {
            target.value = target.value
                .replace(/[^0-9]/g, '')
                .replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3").replace(/(\-{1,2})$/g, "");
        }

        // 2. 비밀번호 실시간 보안 검증
        function checkPw() {
            const pw = document.getElementById('rPw').value;
            const birth = document.getElementById('rBirth').value.replace(/-/g, "");
            const msg = document.getElementById('pwMsg');
            const specialChar = /[\{\}\[\]\/?.,;:|\)*~`!^\-_+<>@\#$%&\\\=\(\'\"]/;

            if (!pw) { msg.innerText = ""; return; }

            if (pw.length < 8) {
                msg.innerText = "❌ 8자 이상 입력해야 합니다.";
                msg.className = "status-msg invalid";
            } else if (!specialChar.test(pw)) {
                msg.innerText = "❌ 특수문자가 포함되어야 합니다.";
                msg.className = "status-msg invalid";
            } else if (birth && pw.includes(birth)) {
                msg.innerText = "❌ 비밀번호에 생년월일을 포함할 수 없습니다.";
                msg.className = "status-msg invalid";
            } else {
                msg.innerText = "✅ 안전한 비밀번호입니다!";
                msg.className = "status-msg valid";
            }
        }

        // 3. 이메일 인증 발송 및 검증
        let serverCode = ""; let isEmailVerified = false;
        async function sendAuthEmail() {
            const email = document.getElementById('rEmail').value;
            if(!email.includes('@')) return alert("이메일을 정확히 입력하세요.");
            document.getElementById('emailBtn').innerText = "발송중...";
            const res = await fetch('/api/send-email', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
            const data = await res.json();
            if(res.ok) { serverCode = data.code; alert("인증번호가 발송되었습니다!"); document.getElementById('emailAuthField').style.display = 'block'; }
            document.getElementById('emailBtn').innerText = "재발송";
        }

        function verifyEmail() {
            if(document.getElementById('rEmailCode').value === serverCode) {
                isEmailVerified = true;
                document.getElementById('emailMsg').innerText = "✅ 인증되었습니다.";
                document.getElementById('emailMsg').className = "status-msg valid";
                document.getElementById('rEmail').readOnly = true;
            } else { alert("인증번호가 다릅니다."); }
        }

        // 4. TTS 문단 하이라이팅 로직
        document.getElementById('tRate').oninput = function() { document.getElementById('rateVal').innerText = this.value + "배속"; };

        function handleSpeak() {
            const txt = document.getElementById('tIn').value.trim();
            const output = document.getElementById('tOut');
            if (!txt) return alert("읽을 글을 입력하세요.");

            window.speechSynthesis.cancel();
            const words = txt.split(/(\s+)/);
            output.innerHTML = words.map((w, i) => w.trim() ? `<span id="word-${i}" class="word">${w}</span>` : w).join('');

            const utter = new SpeechSynthesisUtterance(txt);
            utter.lang = 'ko-KR';
            utter.rate = document.getElementById('tRate').value;
            utter.pitch = document.getElementById('voiceType').value === 'child' ? 1.5 : 1.0;

            utter.onboundary = (e) => {
                if (e.name === 'word') {
                    const charIdx = e.charIndex;
                    let count = 0;
                    words.forEach((w, i) => {
                        const el = document.getElementById(`word-${i}`);
                        if (el) {
                            if (count <= charIdx && charIdx < count + w.length) {
                                el.classList.add('highlight');
                                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            } else { el.classList.remove('highlight'); }
                        }
                        count += w.length;
                    });
                }
            };
            utter.onend = () => { document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight')); };
            window.speechSynthesis.speak(utter);
        }
        function stopSpeak() { window.speechSynthesis.cancel(); document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight')); }

        // 5. 회원가입 제출
        document.getElementById('signupF').onsubmit = async (e) => {
            e.preventDefault();
            if(!document.getElementById('pwMsg').innerText.includes("✅")) return alert("비밀번호 규칙을 확인하세요.");
            if(!isEmailVerified) return alert("이메일 인증이 필요합니다.");

            const payload = {
                userId: document.getElementById('rId').value, 
                pw: document.getElementById('rPw').value,
                email: document.getElementById('rEmail').value, 
                name: document.getElementById('rName').value,
                phone: document.getElementById('rPhone').value, 
                birth: document.getElementById('rBirth').value,
                level: document.getElementById('rLevel').value
            };
            const res = await fetch('/api/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { alert("가입을 축하합니다!"); location.reload(); }
            else { alert("이미 있는 아이디거나 가입 오류가 발생했습니다."); }
        };

        // 6. 로그인 제출 (이름 표시 기능 포함)
        document.getElementById('loginF').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: document.getElementById('lId').value, pw: document.getElementById('lPw').value }) });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('guest-menu').style.display = 'none';
                document.getElementById('user-menu').style.display = 'flex';
                document.getElementById('u-info').innerHTML = `✨ <strong>${data.user.name}</strong>님 환영해요!`;
                closeM('loginModal');
            } else { alert("아이디 혹은 비밀번호가 틀렸습니다."); }
        };
    </script>
</body>
</html>
