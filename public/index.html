<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉬운 글 배움터 - Easy Read</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        :root { --primary: #4a90e2; --secondary: #ffd93d; --bg: #fdfbf7; --text: #333; --white: #fff; --error: #e74c3c; --success: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.8; }
        
        /* 헤더 & 네비게이션 */
        header { background: var(--white); padding: 0 5%; height: 90px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-menu a { text-decoration: none; color: #555; font-weight: 700; }
        
        /* 버튼 스타일 */
        .btn { cursor: pointer; border: none; border-radius: 50px; font-weight: 700; transition: 0.2s; padding: 12px 25px; font-size: 16px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-outline { background: none; color: var(--text); }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        /* 폼 스타일 */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 16px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .checkbox-group input { width: auto; margin-top: 5px; }
        .checkbox-group label { font-size: 13px; font-weight: 400; color: #666; cursor: pointer; }

        .v-msg { font-size: 12px; margin-top: 5px; min-height: 15px; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; gap:30px;">
            <a href="/" class="logo">✨ 쉬운 글 배움터</a>
            <ul class="nav-menu">
                <li><a href="#tts">글 읽어주기</a></li>
                <li><a href="#easy-convert">쉬운 글 변환</a></li>
                <li><a href="#behavior-dict">행동 사전</a></li>
            </ul>
        </div>
        <div id="auth-menu">
            <button class="btn btn-outline" onclick="openM('loginModal')">로그인</button>
            <button class="btn btn-primary" onclick="openM('signupModal')">회원가입</button>
        </div>
        <div id="user-menu" style="display:none;">
            <span id="u-name" style="font-weight:700;"></span>님 환영해요!
            <button class="btn btn-outline" onclick="location.reload()">로그아웃</button>
        </div>
    </header>

    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary);">회원가입</h2>
            <form id="signupF">
                <div class="form-group">
                    <label>성함</label>
                    <input type="text" id="rName" placeholder="실명을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="rId" placeholder="사용할 아이디" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="rPw" placeholder="8자 이상 영문+숫자+특수문자" required>
                    <div id="pVal" class="v-msg"></div>
                </div>
                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <input type="tel" id="rPhone" placeholder="010-0000-0000" required>
                </div>
                <div class="form-group">
                    <label>생년월일</label>
                    <input type="date" id="rBirth" required>
                </div>
                <div class="form-group">
                    <label>나의 배움 단계 (지능 수준)</label>
                    <select id="rLevel" required>
                        <option value="" disabled selected>본인의 단계를 선택하세요</option>
                        <option value="boundary">1단계: 천천히 배우는 단계 (경계선 지능)</option>
                        <option value="mild">2단계: 도움이 필요한 단계 (경도 지적장애)</option>
                        <option value="moderate">3단계: 집중 돌봄 단계 (중등도 지적장애)</option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rAgree" required>
                    <label for="rAgree">
                        <strong>(필수) 개인정보 수집 및 이용 동의</strong><br>
                        회원가입 및 맞춤형 학습 서비스 제공을 위해 성함, 생년월일, 연락처 정보를 수집하는 것에 동의합니다.
                    </label>
                </div>

                <button type="submit" id="sBtn" class="btn btn-primary" style="width:100%; margin-top:20px;">가입 완료</button>
            </form>
            <button onclick="closeM('signupModal')" style="margin-top:15px; border:none; background:none; color:#999; cursor:pointer; width:100%;">취소하기</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">로그인</h2>
            <form id="loginF">
                <div class="form-group"><label>아이디</label><input type="text" id="lId" required></div>
                <div class="form-group"><label>비밀번호</label><input type="password" id="lPw" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">로그인하기</button>
            </form>
            <button onclick="closeM('loginModal')" style="margin-top:10px; border:none; background:none; color:#999; cursor:pointer; width:100%;">닫기</button>
        </div>
    </div>

    <script>
        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        // 비밀번호 유효성 검사 (개인정보 포함 여부 등)
        document.getElementById('rPw').addEventListener('input', function() {
            const pw = this.value;
            const msg = document.getElementById('pVal');
            const regex = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()]).{8,}$/;
            
            if(regex.test(pw)) {
                msg.textContent = "✅ 사용 가능한 비밀번호입니다.";
                msg.style.color = "var(--success)";
            } else {
                msg.textContent = "❌ 8자 이상, 영문/숫자/특수문자를 섞어주세요.";
                msg.style.color = "var(--error)";
            }
        });

        // 회원가입 전송
        document.getElementById('signupF').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                userId: document.getElementById('rId').value,
                pw: document.getElementById('rPw').value,
                name: document.getElementById('rName').value,
                phone: document.getElementById('rPhone').value,
                birth: document.getElementById('rBirth').value,
                level: document.getElementById('rLevel').value
            };

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("반가워요! 가입이 완료되었습니다.");
                closeM('signupModal');
                openM('loginModal');
            } else {
                const data = await res.json();
                alert(data.message || "가입에 실패했습니다.");
            }
        };

        // 로그인 전송
        document.getElementById('loginF').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: document.getElementById('lId').value,
                    pw: document.getElementById('lPw').value
                })
            });

            const data = await res.json();
            if (res.ok) {
                document.getElementById('auth-menu').style.display = 'none';
                document.getElementById('user-menu').style.display = 'block';
                document.getElementById('u-name').textContent = data.user.name;
                closeM('loginModal');
                alert(`${data.user.name}님, 환영합니다!`);
            } else {
                alert(data.message);
            }
        };
    </script>
</body>
</html>
