<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉬운 글 변환기 - 쉬운 글 배움터</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #fdfbf7;
            --white: #ffffff;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
        body { background-color: var(--bg); color: var(--text); }

        /* 헤더 스타일 (index.html과 동일) */
        header {
            background-color: var(--white);
            padding: 0 5%;
            height: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .main-menu { display: flex; list-style: none; gap: 30px; }
        .main-menu li a { text-decoration: none; color: #444; font-size: 18px; font-weight: 700; }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        #guest-menu { display: flex; gap: 10px; }
        #user-menu { display: none; align-items: center; gap: 15px; font-weight: 700; }
        
        .login-btn { text-decoration: none; color: #333; font-weight: 700; }
        .signup-btn { background: var(--primary); color: white; padding: 10px 22px; border-radius: 50px; text-decoration: none; font-weight: 700; }
        .logout-btn { background: #eee; color: #666; padding: 8px 15px; border-radius: 50px; border: none; cursor: pointer; }

        /* 컨텐츠 스타일 */
        .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .card { background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .title-area { text-align: center; margin-bottom: 30px; }
        
        textarea { width: 100%; height: 200px; padding: 20px; border-radius: 15px; border: 2px solid #e6eef8; font-size: 16px; resize: none; margin-bottom: 20px; }
        
        .info-bar { 
            background: #f0f7ff; padding: 15px 25px; border-radius: 50px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .user-level-badge { color: var(--primary); font-weight: 800; }

        .convert-btn { 
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 50px; font-size: 18px; font-weight: 800; cursor: pointer;
        }

        .result-box { 
            margin-top: 30px; padding: 25px; border-radius: 20px; 
            background: #fff; border: 2px dashed #bcd6f5; min-height: 100px; line-height: 1.8;
        }
        
        /* 툴팁 스타일 */
        .word { border-bottom: 2px solid var(--primary); cursor: help; position: relative; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">✨ 쉬운 글 배움터</a>
            <ul class="main-menu">
                <li><a href="about.html">서비스 소개</a></li>
                <li><a href="text.html">쉬운 글 변환기</a></li>
                <li><a href="behavior.html">행동 사전</a></li>
                <li><a href="read.html">글 읽어주기</a></li>
            </ul>
        </div>
        <div class="header-right">
            <div id="guest-menu">
                <a href="login.html" class="login-btn">로그인</a>
                <a href="signup.html" class="signup-btn">회원가입</a>
            </div>
            <div id="user-menu">
                <span id="user-info">사용자님, 환영합니다!</span>
                <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="title-area">
                <h2>✍️ 쉬운 글 변환기</h2>
                <p>내 학습 수준에 맞춰 글을 쉽게 바꿔보세요.</p>
            </div>

            <textarea id="inputText" placeholder="변환하고 싶은 어려운 글을 입력하세요..."></textarea>

            <div class="info-bar">
                <span>나의 맞춤 학습 수준: <span id="displayLevel" class="user-level-badge">불러오는 중...</span></span>
                <input type="hidden" id="userLevelValue" value="보통">
            </div>

            <button class="convert-btn" onclick="convertText()">지금 바로 변환하기</button>

            <div id="result" class="result-box">결과가 여기에 표시됩니다.</div>
        </div>
    </div>

    <script>
        // 1. 페이지 로드 시 인증 및 수준 정보 로드
        window.onload = async function() {
            try {
                const response = await fetch('/api/check-auth');
                if (response.ok) {
                    const userData = await response.json();
                    localStorage.setItem('currentUser', userData.name);
                    
                    // UI 반영
                    applyLoggedInUI(userData.name);
                    
                    // 학습 수준 로드 및 적용
                    if (userData.level) {
                        document.getElementById('displayLevel').innerText = userData.level;
                        document.getElementById('userLevelValue').value = userData.level;
                    }
                } else {
                    localStorage.removeItem('currentUser');
                    // 로그인 안되어있으면 접근 제한 (선택 사항)
                    // alert("로그인이 필요한 서비스입니다.");
                    // location.href = 'login.html';
                }
            } catch (error) {
                console.error("인증 로드 실패:", error);
            }
        };

        // 2. 로그인 UI 전환
        function applyLoggedInUI(userName) {
            document.getElementById('guest-menu').style.display = 'none';
            document.getElementById('user-menu').style.display = 'flex';
            document.getElementById('user-info').innerHTML = `✨ <strong>${userName}</strong>님`;
        }

        // 3. 로그아웃 처리
        async function handleLogout() {
            if (confirm("로그아웃 하시겠습니까?")) {
                await fetch('/api/logout', { method: 'POST' });
                localStorage.removeItem('currentUser');
                location.reload();
            }
        }

        // 4. 핵심: 변환 함수 (Error 해결 지점)
        async function convertText() {
            const text = document.getElementById("inputText").value.trim();
            const level = document.getElementById("userLevelValue").value; // 읽어온 수준 사용
            const resultBox = document.getElementById("result");

            if (!text) {
                alert("내용을 입력해주세요!");
                return;
            }

            resultBox.innerHTML = "✨ 맞춤 수준에 맞춰 변환하고 있습니다...";

            try {
                const res = await fetch("/api/easy-text", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text, level }),
                });

                if (!res.ok) throw new Error("변환 실패");

                const data = await res.json();
                resultBox.innerHTML = data.result; // HTML 응답 출력
            } catch (error) {
                console.error(error);
                resultBox.innerHTML = "😢 변환 중 오류가 발생했습니다. 다시 시도해주세요.";
            }
        }
    </script>
</body>
</html>
